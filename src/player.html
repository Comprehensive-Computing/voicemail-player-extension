<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MS GSM WAV Player</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; color: #202124; }
    .wrap { padding: 16px; }
    .title { font-size: 14px; font-weight: 600; margin-bottom: 12px; word-break: break-word; }
    .status { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 999px; background: #1a73e8; color: #fff; font-size: 12px; font-weight: 600; margin-bottom: 12px; }
    .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.45); border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    audio { width: 100%; display: none; }
    .actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .button { border: 1px solid #dadce0; background: #fff; color: #202124; border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 500; text-decoration: none; cursor: pointer; }
    .error { display: none; color: #b3261e; font-size: 13px; line-height: 1.4; margin-bottom: 12px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title" id="title">Preparing audio…</div>
    <div class="status" id="status"><span class="spinner"></span><span id="status-text">Transcoding...</span></div>
    <div class="error" id="error"></div>
    <audio id="audio" controls autoplay></audio>
    <div class="actions">
      <a class="button" id="download" download>Download</a>
      <button class="button" id="close" type="button">Close</button>
    </div>
  </div>
  <script type="module" src="./player.js"></script>
</body>
</html>
